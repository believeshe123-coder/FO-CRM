<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom CRM Manager</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <aside class="rail" aria-label="Primary navigation">
        <div class="brand-mark">C</div><div class="rail-icon">⌂</div><div class="rail-icon active">▦</div><div class="rail-icon">✓</div>
      </aside>
      <section class="shell">
        <nav class="sidebar">
          <h1>CRM Manager</h1>
          <button class="nav-pill active" data-view="deals">Deals</button>
          <button class="nav-pill" data-view="tasks">Tasks</button>
          <div class="customizer">
            <p>CUSTOMIZE</p>
            <label>Accent color<input id="accent" type="color" value="#0b55ff" /></label>
            <label>Card radius<input id="radius" type="range" min="4" max="28" value="14" /></label>
            <label class="toggle"><input id="compact" type="checkbox" /> Compact boards</label>
          </div>
        </nav>
        <section class="workspace" id="workspace">
          <header class="topbar">
            <div><p class="breadcrumb">Deals / Customer / Employer Pipeline <span>HQ</span>⌄</p><h2 id="page-title">Deals</h2></div>
            <div class="top-actions"><span>⌕</span><span>⚙</span><span>◉</span></div>
          </header>
          <section id="content"></section>
        </section>
      </section>
    </main>
    <script src="/src/main.js"></script>
  </body>
</html>
