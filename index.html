<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom CRM Manager</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <aside class="rail" aria-label="Group navigation">
        <div class="group-switcher" id="group-switcher" aria-label="Business groups"></div>
        <div class="rail-spacer"></div>
        <details class="auth-panel" id="auth-panel" hidden>
          <summary class="profile-button" aria-label="Account">
            <span id="user-email"></span>
          </summary>
          <button class="secondary-action" id="logout-button" type="button">Log out</button>
        </details>
      </aside>
      <section class="shell">
        <section class="workspace" id="workspace">
          <header class="topbar">
            <div class="topbar-title" id="topbar-title"><p class="breadcrumb" id="breadcrumb">Pipelines</p><h2 id="page-title">Pipelines</h2></div>
            <div class="topbar-actions" id="topbar-actions"></div>
          </header>
          <section id="content"></section>
        </section>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/src/env.js"></script>
    <script src="/src/main.js"></script>
  </body>
</html>
